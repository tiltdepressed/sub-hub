openapi: 3.0.3
info:
	title: sub-hub API
	version: 0.1.0
servers:
	- url: http://localhost:8080
paths:
	/healthz:
		get:
			summary: Liveness probe
			responses:
				'200':
					description: OK
					content:
						application/json:
							schema:
								type: object
								properties:
									status:
										type: string
	/readyz:
		get:
			summary: Readiness probe
			responses:
				'200':
					description: Ready
					content:
						application/json:
							schema:
								type: object
								properties:
									status:
										type: string
				'503':
					description: Not ready
					content:
						application/json:
							schema:
								$ref: '#/components/schemas/ErrorResponse'
	/api/v1/ping:
		get:
			summary: Ping
			responses:
				'200':
					description: Pong
					content:
						application/json:
							schema:
								type: object
								properties:
									pong:
										type: string
	/api/v1/subscriptions:
		get:
			summary: List subscriptions
			parameters:
				- in: query
					name: user_id
					schema:
						type: string
						format: uuid
				- in: query
					name: service_name
					schema:
						type: string
				- in: query
					name: from
					schema:
						type: string
						example: 07-2025
				- in: query
					name: to
					schema:
						type: string
						example: 09-2025
				- in: query
					name: limit
					schema:
						type: integer
						default: 50
				- in: query
					name: offset
					schema:
						type: integer
						default: 0
			responses:
				'200':
					description: OK
					content:
						application/json:
							schema:
								type: array
								items:
									$ref: '#/components/schemas/Subscription'
		post:
			summary: Create subscription
			requestBody:
				required: true
				content:
					application/json:
						schema:
							$ref: '#/components/schemas/SubscriptionCreate'
			responses:
				'201':
					description: Created
					content:
						application/json:
							schema:
								$ref: '#/components/schemas/Subscription'
				'400':
					description: Bad request
					content:
						application/json:
							schema:
								$ref: '#/components/schemas/ErrorResponse'
	/api/v1/subscriptions/{id}:
		parameters:
			- in: path
				name: id
				required: true
				schema:
					type: string
					format: uuid
		get:
			summary: Get subscription by id
			responses:
				'200':
					description: OK
					content:
						application/json:
							schema:
								$ref: '#/components/schemas/Subscription'
				'404':
					description: Not found
					content:
						application/json:
							schema:
								$ref: '#/components/schemas/ErrorResponse'
		put:
			summary: Update subscription
			requestBody:
				required: true
				content:
					application/json:
						schema:
							$ref: '#/components/schemas/SubscriptionCreate'
			responses:
				'200':
					description: OK
					content:
						application/json:
							schema:
								$ref: '#/components/schemas/Subscription'
				'400':
					description: Bad request
					content:
						application/json:
							schema:
								$ref: '#/components/schemas/ErrorResponse'
				'404':
					description: Not found
					content:
						application/json:
							schema:
								$ref: '#/components/schemas/ErrorResponse'
		delete:
			summary: Delete subscription
			responses:
				'204':
					description: Deleted
				'404':
					description: Not found
					content:
						application/json:
							schema:
								$ref: '#/components/schemas/ErrorResponse'
	/api/v1/subscriptions/total:
		get:
			summary: Total cost for period
			parameters:
				- in: query
					name: from
					required: true
					schema:
						type: string
						example: 07-2025
				- in: query
					name: to
					required: true
					schema:
						type: string
						example: 09-2025
				- in: query
					name: user_id
					schema:
						type: string
						format: uuid
				- in: query
					name: service_name
					schema:
						type: string
			responses:
				'200':
					description: OK
					content:
						application/json:
							schema:
								type: object
								properties:
									total:
										type: integer
										format: int64
				'400':
					description: Bad request
					content:
						application/json:
							schema:
								$ref: '#/components/schemas/ErrorResponse'
components:
	schemas:
		ErrorResponse:
			type: object
			required: [error]
			properties:
				error:
					type: string
		SubscriptionCreate:
			type: object
			required: [service_name, price, user_id, start_date]
			properties:
				service_name:
					type: string
					example: Yandex Plus
				price:
					type: integer
					example: 400
				user_id:
					type: string
					format: uuid
				start_date:
					type: string
					example: 07-2025
				end_date:
					type: string
					example: 10-2025
		Subscription:
			allOf:
				- $ref: '#/components/schemas/SubscriptionCreate'
				- type: object
					required: [id]
					properties:
						id:
							type: string
							format: uuid

