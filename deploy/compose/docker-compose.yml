services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: subhub
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d subhub"]
      interval: 5s
      timeout: 5s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"
      - "4317:4317"

  prometheus:
    image: prom/prometheus:v2.52.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  app:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.dev
    environment:
      HTTP_ADDR: ":8080"
      DB_DSN: "postgres://postgres:postgres@postgres:5432/subhub?sslmode=disable"
      TRACING_ENABLED: "true"
      TRACING_ENDPOINT: "jaeger:4317"
      OPENAPI_PATH: "api/openapi.yaml"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started

